web:
  # HTTP port (internal/API access)
  port: 8080
  # MOTD (leave blank to use server.properties value; supports & color codes)
  motd: ""

  # HTTPS settings
  https:
    enabled: false
    port: 8443

    # ── ACME (Let's Encrypt auto-issuance) ─────────────────────
    acme:
      enabled: false
      domain: "mc.example.com"      # Domain to issue a certificate for
      email: "admin@example.com"    # Let's Encrypt account email
      # HTTP-01 challenge port (must be reachable externally on port 80)
      # Oracle: NSG + iptables 80/TCP must be allowed
      challenge-port: 80

    # ── Manual certificate (used when ACME is disabled) ─────────
    # certbot paths:
    #   cert: "/etc/letsencrypt/live/domain/fullchain.pem"
    #   key:  "/etc/letsencrypt/live/domain/privkey.pem"
    cert: ""
    key: ""

  # Public base URL used for /dashboard login link (no trailing slash)
  # e.g. "https://mc.example.com:8443" or "http://1.2.3.4:8080"
  # Leave blank to default to http://localhost:<port>
  public-url: ""

  # API authentication token (change this!)
  token: "changeme-please"
