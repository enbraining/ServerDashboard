web:
  # HTTP 포트 (내부/curl 접근용으로 유지)
  port: 8080

  # HTTPS 설정 (.dev 도메인 등 HSTS 강제 도메인에 필요)
  https:
    enabled: false
    port: 8443
    # Let's Encrypt PEM 파일 경로 (절대 경로)
    # certbot 기준:
    #   cert: "/etc/letsencrypt/live/도메인/fullchain.pem"
    #   key:  "/etc/letsencrypt/live/도메인/privkey.pem"
    cert: ""
    key: ""

  # API 인증 토큰 (반드시 변경하세요!)
  token: "changeme-please"
